		<script type="text/javascript">
			
		helloft = document.getElementById("hey");
		downloadlink = document.getElementById("secretdownloadlink");
		helloft.ondblclick = showsecretdownloadlink;
		function showsecretdownloadlink(){
			downloadlink.style.opacity = 1;
		}
			
			
		function playToto(){
			playing = 0;
			var toto = document.getElementById("sound_toto"); 
			toto.preload = "auto";
  			toto.loop = true;
			toto.play();
			document.body.onkeydown = function(a){
					if(a.keyCode == 84 && playing == 0){
							playing = 1;
							toto.play();	
					}
			}	
		}
